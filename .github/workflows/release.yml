name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "${TAG}" ]; then
            TAG="${GITHUB_REF##*/}"
          fi
          if [ -z "${TAG}" ]; then
            echo "Could not resolve tag from ref."
            exit 1
          fi
          PRERELEASE=false
          if [[ "${TAG}" == *"-"* ]]; then
            PRERELEASE=true
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag/version consistency
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )"
          CODE_VERSION="$(python - <<'PY'
          import pathlib
          ns = {}
          exec(pathlib.Path("netbox_unifi_sync/version.py").read_text(), ns)
          print(ns["__version__"])
          PY
          )"
          test "${TAG}" = "${PYPROJECT_VERSION}" || (echo "Tag v${TAG} != pyproject version ${PYPROJECT_VERSION}" && exit 1)
          test "${TAG}" = "${CODE_VERSION}" || (echo "Tag v${TAG} != netbox_unifi_sync/version.py ${CODE_VERSION}" && exit 1)

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
