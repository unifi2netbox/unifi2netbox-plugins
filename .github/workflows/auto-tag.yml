name: Auto Tag

on:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check if commit is already tagged
        id: precheck
        shell: bash
        run: |
          set -euo pipefail
          if git tag --points-at "${GITHUB_SHA}" | grep -Eq '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Commit already has a release tag; skipping auto-tag."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve release tag from package version
        if: steps.precheck.outputs.skip != 'true'
        id: next
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )"
          NEXT_TAG="v${VERSION}"

          if ! echo "${NEXT_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$'; then
            echo "Invalid version format in pyproject.toml: ${VERSION}"
            exit 1
          fi

          if git tag -l "${NEXT_TAG}" | grep -q "^${NEXT_TAG}$"; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Tag ${NEXT_TAG} already exists; skipping."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            echo "next_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"
            echo "Next tag: ${NEXT_TAG}"
          fi

      - name: Create and push tag
        if: steps.precheck.outputs.skip != 'true' && steps.next.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.next.outputs.next_tag }}"
          git tag -a "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"
          git push origin "${TAG}"
