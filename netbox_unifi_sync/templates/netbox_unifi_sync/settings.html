{% extends 'base/layout.html' %}

{% block title %}UniFi Sync Settings{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header"><strong>Global Settings</strong></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>
</div>
{% endblock %}
